<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sahil Garer - Front-end developer social links">
    <title>Social link profile</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: "Roboto", sans-serif;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: black;

        }

        nav {
            position: absolute;
            display: flex;
            justify-content: right;
            top: 0;
            left: 0;
            padding: 1rem;
            background-color: black;
            max-width: 100vw;
            width: 100%;
            color: whitesmoke;
            text-shadow: 0 1px rgba(0, 0, 0, 0.9);
            font-size: 1rem;
            box-shadow: 0 0 10px 0 rgba(155, 138, 138, 0.9);
        }

        main {
            border-radius: 0.6rem;
            background: #202020;
            color: whitesmoke;
            max-width: 343px;
            padding: 1.5rem;
            box-shadow: 0 10px 25px rgba(155, 138, 138, 0.5);

        }

        .address {
            color: greenyellow;
            line-height: 1.5;
        }

        p {
            line-height: 1.5;
        }

        #time {
            color: #fff;
        }

        img {
            margin: 0.5rem;
            border-radius: 50%;
        }

        li {
            list-style-type: none;
            margin: 1em;
            background-color: rgb(45, 44, 44);
            border-radius: 1rem;


        }

        li a {
            text-decoration: none;
            color: whitesmoke;
            font-weight: bold;
            display: block;
            transition: 0.2s ease;
            padding: 0.5rem;
        }

        li a:hover,
        li a:focus {
            background-color: black;
            color: white;
            transform: scale(1.05);
            border-radius: 1rem;
            outline: none;
        }

        a:focus-visible {
            outline: 2px solid greenyellow;
            outline-offset: 3px;
        }

        .emoji {
            display: none;
        }

        li a:hover .emoji,
        li a:active .emoji {
            display: inline;
        }

        li a:active {
            background-color: #111;
            transform: scale(0.97);
        }


        .bio {
            text-align: center;
            line-height: normal;
            padding: 1rem;
        }

        #start {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            cursor: pointer;
            
        }
    </style>

</head>

<body>
    <div id="start">Click to Enter</div>

    <audio id="loading" src="rom-rom-bhaiyo.mp3"></audio>
    <div class="" id="content" style="display: none;">
        <nav>
            <p><span id="time"></span></p>
        </nav>
        <main>
            <img src="sahil.jpeg" alt="avatar-Sahil" width="100">
            <h2>SAHIL GARER</h2>
            <p class="address">Rajasthan, India</p>
            <p class="bio">"Front-end developer and avid Haryanvi Music Listener."</p>

            <ul>
                <li><a href="https://github.com/Vicioussahil" onclick="sound(event,this)" class="Github">GitHub <span
                            class="emoji">👉</span></a></li>
                <audio src="cid-acp-behn-choo.mp3" id="clickable"></audio>
                <audio id="pageSound" src="kya-cheda-bhosdi.mp3"></audio>
                <!-- <audio src="faaah.mp3" id="loading"></audio> -->
                <li><a href="https://www.youtube.com/@jatrajasthanalla5377">YouTube <span class="emoji">👉</span></a>
                </li>
                <li><a href="https://www.linkedin.com/in/sahil-garer-314ab334a/">LinkedIn <span
                            class="emoji">👉</span></a>
                </li>
                <li><a href="https://t.me/royaljaatsahil">Telegram <span class="emoji">👉</span></a></li>
                <li><a href="https://www.facebook.com/sahil.garer.2025/">Facebook <span class="emoji">👉</span></a></li>
            </ul>
        </main>
    </div>
    <script>
        function displayTime() {
            let time = new Date();
            time = time.toLocaleTimeString();
            console.log(time);
            document.getElementById('time').innerHTML = time;
        }
        displayTime();
        setInterval(displayTime, 1000);
    </script>
    <script>
        // function sound(event, element) {
        //     event.preventDefault(); // stop link from opening immediately

        //     const click = document.getElementById("clickable");
        //     const url = element.href;

        //     console.log("play sound");

        //     click.currentTime = 0;
        //     click.play();

        //     setTimeout(function () {
        //         window.location.href = url;
        //     }, 2000); // delay before opening link
        // }
        document.getElementById("start").addEventListener("click", function () {

            const audio = document.getElementById("loading");
            const content = document.getElementById("content");

            audio.play();

            this.style.display = "none";
            audio.onended = function () {
                content.style.display = "block";
            };


        });







       const linkSound = document.getElementById("clickable");
const pageSound = document.getElementById("pageSound");

let firstClick = true;

document.addEventListener("click", function(e){

    if(firstClick){
        firstClick = false;   // ignore first click
        return;
    }

    const link = e.target.closest("a");

    if(link){
        e.preventDefault();

        const url = link.href;

        linkSound.pause();
        linkSound.currentTime = 0;
        linkSound.play();

        linkSound.onended = function(){
            window.location.href = url;
        };

    } else {

        pageSound.pause();
        pageSound.currentTime = 0;
        pageSound.play();

    }

});
    </script>
</body>

</html>
